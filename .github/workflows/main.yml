name: Pre-commit Auto-fix

on:
  pull_request:
    branches:
      - main  # Specify the target branch for pull requests

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}  # Checkout the pull request branch

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'  # Specify the Python version

      - name: Install pre-commit
        run: |
          pip install pre-commit

      - name: Run pre-commit and auto-fix
        run: |
          pre-commit run --all-files --hook-stage manual
        # Use a hook-stage that allows for fixes

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Auto-fix formatting with pre-commit" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref }}
